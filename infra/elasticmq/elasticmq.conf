// Declared queue topology. Failed messages redrive to the matching DLQ
// after 3 receives — a growing DLQ is a symptom worth reading.
include classpath("application.conf")

node-address {
  protocol = http
  host = queue
  port = 9324
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  documents-inbox {
    defaultVisibilityTimeout = 60 seconds
    receiveMessageWait = 10 seconds
    deadLettersQueue {
      name = "documents-inbox-dlq"
      maxReceiveCount = 3
    }
  }
  documents-inbox-dlq {}

  documents-chunks {
    defaultVisibilityTimeout = 60 seconds
    receiveMessageWait = 10 seconds
    deadLettersQueue {
      name = "documents-chunks-dlq"
      maxReceiveCount = 3
    }
  }
  documents-chunks-dlq {}
}
